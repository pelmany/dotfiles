[os]
disabled = false
style = "bg:red fg:surface0"

[os.symbols]
Windows = "ЬюЈ"
Ubuntu = "з░Ћѕ"
SUSE = "№їћ"
Raspbian = "з░љ┐"
Mint = "з░БГ"
Macos = "з░ђх"
Manjaro = "№їњ"
Linux = "з░їй"
Gentoo = "з░Бе"
Fedora = "з░БЏ"
Alpine = "№їђ"
AOSC = "№їЂ"
Arch = "з░БЄ"
Artix = "з░БЄ"
CentOS = "№їё"
Debian = "з░Бџ"
Redhat = "з▒ёЏ"
RedHatEnterprise = "з▒ёЏ"

[username]
show_always = true
style_user = "bg:red fg:surface0"
style_root = "bg:red fg:surface0"
format = '[ $user ]($style)'

[directory]
style = "bg:peach fg:surface0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "Рђд/"

[directory.substitutions]
"Documents" = "з░ѕЎ "
"лћлЙл║ЛЃл╝лхлйЛѓЛІ" = "з░ѕЎ "
"Downloads" = "№ђЎ "
"лЌл░л│ЛђЛЃлил║лИ" = "№ђЎ "
"Music" = "ЬЙй "
"люЛЃлиЛІл║л░" = "ЬЙй "
"Pictures" = "№ђЙ "
"лўлилЙл▒Лђл░лХлхлйлИЛЈ" = "№ђЙ "
"Dev" = "з░▓І "

[git_branch]
symbol = "Ьѓа"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:surface0 bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:surface0 bg:yellow)]($style)'

[c]
symbol = "Ьўъ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[cpp]
symbol = "ЬўЮ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[rust]
symbol = "Ьъе"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[haskell]
symbol = "ЬўЪ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[golang]
symbol = "ЬўД"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[java]
symbol = "ЬЅќ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[kotlin]
symbol = "Ьў┤"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[python]
symbol = "Ьўє"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:surface0 bg:green)]($style)'

[lua]
symbol = "Ьўа"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[nodejs]
symbol = "з░јЎ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:surface0 bg:green)]($style)'

[package]
symbol = "з░ЈЌ"
style = "bg:color_bg3"
format = '[[ $symbol( $version) ](fg:surface0 bg:sapphire)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:surface0 bg:sapphire)]($style)'

[time]
disabled = false
time_format = "%X"
style = "bg:lavender"
format = '[[ №љ║ $time ](fg:surface0 bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[РЮ»](bold fg:green)'
error_symbol = '[РЮ»](bold fg:red)'
vimcmd_symbol = '[РЮ«](bold fg:green)'
vimcmd_replace_one_symbol = '[РЮ«](bold fg:lavender)'
vimcmd_replace_symbol = '[РЮ«](bold fg:lavender)'
vimcmd_visual_symbol = '[РЮ«](bold fg:yellow)'

[cmd_duration]
disabled = true
show_milliseconds = true
format = "ЬФ┤ in $duration "
style = "bg:lavender"
show_notifications = true
min_time_to_notify = 45000

[battery]
disabled = true
