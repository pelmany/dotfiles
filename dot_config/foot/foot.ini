[main]
include=~/.config/foot/themes/catppuccin-macchiato
title=footerm
font=JetBrainsMono NL Nerd Font:size=12
pad=10x10
initial-window-size-pixels=900x700
box-drawings-uses-font-glyphs=no

[environment]
EDITOR=nvim
VISUAL=nvim

[bell]
system=no

[colors-dark]
alpha=1.0
[colors-light]
alpha=1.0

[csd]
preferred=server

[cursor]
style=beam
unfocused-style=hollow
blink=yes
blink-rate=600
